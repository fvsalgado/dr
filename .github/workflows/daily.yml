name: Daily PA Monitor

on:
  schedule:
    # 07:00 UTC = 08:00 Lisboa (inverno) / 09:00 (verão com DST)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Data a processar (YYYY-MM-DD). Deixar em branco = hoje"
        required: false
        default: ""
      days:
        description: "DRE + Parlamento — quantos dias recuar a partir da data (inclusive)"
        type: choice
        required: false
        default: "30"
        options:
          - "1"
          - "7"
          - "10"
          - "30"

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    env:
      # Cron: sem inputs → 30 dias (igual ao default dos scrapers). Manual: usa a escolha do formulário.
      SCRAPER_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.days || '30' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run DRE scraper
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python scraper/dre.py "$DATE_ARG" --days "$SCRAPER_DAYS"
          else
            python scraper/dre.py --days "$SCRAPER_DAYS"
          fi

      - name: Run Parlamento scraper
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python scraper/parlamento.py "$DATE_ARG" --days "$SCRAPER_DAYS"
          else
            python scraper/parlamento.py --days "$SCRAPER_DAYS"
          fi

      - name: Validate configured news sources
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "scraper")
          import news

          required = {
              "news-publituris",
              "news-eco",
              "news-expresso",
              "news-ambienteonline",
              "news-ambitur",
          }
          configured = set(news.configured_news_sources())
          missing = sorted(required - configured)
          if missing:
              raise SystemExit(f"Missing news sources in scraper/news.py: {missing}")
          print("Configured news sources:", sorted(configured))
          PY

      - name: Run News scrapers (headline-only)
        run: python scraper/news.py

      - name: Commit updated data
        run: |
          git config user.name  "pa-monitor[bot]"
          git config user.email "pa-monitor[bot]@users.noreply.github.com"
          git add data/results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update results $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send email digest
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN:  ${{ secrets.MAILGUN_DOMAIN }}
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
        run: python email/digest.py
